name: Compile Concept Paper

on:
  workflow_dispatch:
  push:
    paths: "concept.typ"

jobs:
  compile-paper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run compile
        run: docker run --rm --mount type=bind,src="$PWD",dst=/work --workdir /work ghcr.io/typst/typst:latest compile concept.typ concept.pdf
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          path: concept.pdf
      - name: Upload static files as artifact
        id: deployment
        uses: actions/upload-pages-artifact@v5
        with:
          path: "concept.pdf"


  deploy-pages:
    environment:
      name: concept
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: compile-paper
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4